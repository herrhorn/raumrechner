name: E2E

# Triggered by Vercel after each successful deploy. Runs Playwright against
# the production domain (raumrechner.vercel.app) for Production deployments.
# Per-deployment URLs are behind Vercel Authentication on the Hobby plan and
# cannot be hit by CI without a bypass token, so we use the canonical domain.
on:
  deployment_status:

jobs:
  e2e:
    name: E2E (${{ github.event.deployment.environment }})
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
        with:
          ref: ${{ github.event.deployment.ref }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.2.3
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install system deps for cached browser
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Resolve test URL
        id: url
        run: |
          if [ "$ENVIRONMENT" = "Production" ]; then
            echo "base_url=https://raumrechner.vercel.app" >> "$GITHUB_OUTPUT"
          else
            echo "base_url=${DEPLOYMENT_URL}" >> "$GITHUB_OUTPUT"
          fi
        env:
          ENVIRONMENT: ${{ github.event.deployment.environment }}
          DEPLOYMENT_URL: ${{ github.event.deployment_status.target_url }}

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          BASE_URL: ${{ steps.url.outputs.base_url }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: playwright-report-${{ github.event.deployment.environment }}-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7
