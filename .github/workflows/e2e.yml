name: E2E

# Triggered by Vercel after each successful deploy. Runs Playwright against
# the freshly-deployed URL — preview for PRs, production for pushes to main.
on:
  deployment_status:

jobs:
  e2e:
    name: E2E (${{ github.event.deployment.environment }})
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install system deps for cached browser
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Resolve test URL
        id: url
        run: |
          # Vercel's per-deployment URLs are protected by Vercel Authentication on
          # the Hobby plan. Use the canonical production domain for production
          # deployments; fall back to the deployment-specific URL for previews.
          if [ "$ENVIRONMENT" = "Production" ]; then
            echo "base_url=https://raumrechner.vercel.app" >> "$GITHUB_OUTPUT"
          else
            echo "base_url=${DEPLOYMENT_URL}" >> "$GITHUB_OUTPUT"
          fi
        env:
          ENVIRONMENT: ${{ github.event.deployment.environment }}
          DEPLOYMENT_URL: ${{ github.event.deployment_status.target_url }}

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          BASE_URL: ${{ steps.url.outputs.base_url }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.event.deployment.environment }}-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7
