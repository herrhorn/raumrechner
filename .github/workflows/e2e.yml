name: E2E

# Triggered by Vercel after each successful deploy. Runs Playwright against
# the freshly-deployed URL — preview for PRs, production for pushes to main.
on:
  deployment_status:

jobs:
  e2e:
    name: E2E (${{ github.event.deployment.environment }})
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install system deps for cached browser
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Verify JWT_SECRET matches deployment
        run: |
          TOKEN=$(node -e "
            const { SignJWT } = require('jose');
            new SignJWT({ userId: 'diag', email: 'diag@test', type: 'session' })
              .setProtectedHeader({ alg: 'HS256' })
              .setIssuedAt()
              .setExpirationTime('5m')
              .sign(new TextEncoder().encode(process.env.JWT_SECRET))
              .then(t => process.stdout.write(t));
          ")
          BODY=$(curl -s -w "\nHTTP:%{http_code}" \
            -H "Cookie: planar_session=${TOKEN}" \
            "${BASE_URL}/api/auth/me")
          STATUS=$(echo "$BODY" | grep "^HTTP:" | cut -d: -f2)
          echo "Deployment: ${BASE_URL}"
          echo "auth/me → HTTP ${STATUS}"
          echo "Response body: $(echo "$BODY" | grep -v "^HTTP:")"
          echo "Secret length: ${#JWT_SECRET}  prefix: ${JWT_SECRET:0:6}"
          if [ "$STATUS" != "200" ]; then
            echo "JWT_SECRET in GitHub Secrets does not match Vercel env var — update one to match the other."
            exit 1
          fi
        env:
          BASE_URL: ${{ github.event.deployment_status.target_url }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          BASE_URL: ${{ github.event.deployment_status.target_url }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.event.deployment.environment }}-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7
