<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in — Planar</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" media="(prefers-color-scheme: light)">
  <link rel="icon" type="image/svg+xml" href="favicon-dark.svg" media="(prefers-color-scheme: dark)">
  <link rel="alternate icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-body">
  <main class="auth-main">
    <div class="auth-card">
      <a class="brand auth-brand" href="/" aria-label="Planar">
        <svg class="brand-mark" width="28" height="28" viewBox="0 0 64 64" aria-hidden="true">
          <rect x="10" y="10" width="44" height="44" fill="none" stroke="currentColor" stroke-width="3"/>
          <line x1="10" y1="6" x2="10" y2="14" stroke="currentColor" stroke-width="3"/>
          <line x1="54" y1="6" x2="54" y2="14" stroke="currentColor" stroke-width="3"/>
          <line x1="10" y1="50" x2="10" y2="58" stroke="currentColor" stroke-width="3"/>
          <line x1="54" y1="50" x2="54" y2="58" stroke="currentColor" stroke-width="3"/>
          <line x1="6" y1="10" x2="14" y2="10" stroke="currentColor" stroke-width="3"/>
          <line x1="50" y1="10" x2="58" y2="10" stroke="currentColor" stroke-width="3"/>
          <line x1="6" y1="54" x2="14" y2="54" stroke="currentColor" stroke-width="3"/>
          <line x1="50" y1="54" x2="58" y2="54" stroke="currentColor" stroke-width="3"/>
          <circle cx="32" cy="32" r="3" fill="currentColor"/>
        </svg>
        <h1>Planar</h1>
      </a>

      <div id="loginForm">
        <p class="auth-lead">Enter your email to sign in. We'll send you a one-time link.</p>
        <form id="form">
          <label class="field-label" for="email">Email</label>
          <input id="email" type="email" required autocomplete="email" autofocus class="auth-input">
          <button type="submit" class="btn btn-primary" id="submit">Send link</button>
        </form>
        <p id="error" class="auth-error" hidden></p>
      </div>

      <div id="sentMessage" hidden>
        <p class="auth-lead">Check your inbox.</p>
        <p class="auth-detail">We sent a sign-in link to <strong id="sentEmail"></strong>. The link expires in 15 minutes.</p>
      </div>
    </div>
  </main>

  <script>
    const form = document.getElementById('form');
    const emailInput = document.getElementById('email');
    const submitBtn = document.getElementById('submit');
    const errorEl = document.getElementById('error');
    const loginForm = document.getElementById('loginForm');
    const sentMessage = document.getElementById('sentMessage');
    const sentEmail = document.getElementById('sentEmail');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.hidden = true;
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending…';
      try {
        const res = await fetch('/api/auth/send', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ email: emailInput.value }),
        });
        if (!res.ok) {
          const { error } = await res.json().catch(() => ({}));
          throw new Error(error || `Failed: ${res.status}`);
        }
        sentEmail.textContent = emailInput.value;
        loginForm.hidden = true;
        sentMessage.hidden = false;
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.hidden = false;
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send link';
      }
    });
  </script>
</body>
</html>
