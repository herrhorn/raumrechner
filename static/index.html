<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Grundriss Flächenmesser</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Grundriss Flächenmesser</h1>
    <div class="zoom-controls">
      <button id="zoomOut" title="Herauszoomen">−</button>
      <span id="zoomLevel">100%</span>
      <button id="zoomIn" title="Hineinzoomen">+</button>
      <button id="zoomReset" title="Zoom zurücksetzen">Reset</button>
    </div>
  </header>
  <main>
    <div id="mainContent">
      <aside id="sidebar">
        <section class="card" data-card="grundriss">
          <button class="card-header" type="button">
            <span class="card-num">1</span>
            <span class="card-title">Grundriss</span>
            <span class="card-toggle" aria-hidden="true">▾</span>
          </button>
          <div class="card-body">
            <div class="field">
              <label for="fileInput" class="field-label">PDF Datei</label>
              <input id="fileInput" type="file" accept="application/pdf">
            </div>
            <div class="card-divider"></div>
            <div class="field">
              <span class="field-label">Kalibrierung</span>
              <span id="calInfo" class="field-value">Keine Kalibrierung</span>
            </div>
            <button id="startCal" class="btn btn-secondary">Kalibrieren (2 Punkte)</button>
          </div>
        </section>

        <section class="card" data-card="polygons">
          <button class="card-header" type="button">
            <span class="card-num">2</span>
            <span class="card-title">Polygone</span>
            <span class="card-toggle" aria-hidden="true">▾</span>
          </button>
          <div class="card-body">
            <button id="drawPoly" class="btn btn-primary">+ Neues Polygon</button>
            <button id="finishPoly" class="btn btn-secondary" hidden>Hinzufügen</button>
            <div id="currentPolyName"></div>
            <div id="polygonList"></div>
          </div>
        </section>

        <section class="card" data-card="project">
          <button class="card-header" type="button">
            <span class="card-num">3</span>
            <span class="card-title">Projekt</span>
            <span class="card-toggle" aria-hidden="true">▾</span>
          </button>
          <div class="card-body">
            <button id="exportPdf" class="btn btn-primary">Als PDF exportieren</button>
            <div class="card-divider"></div>
            <button id="saveCloud" class="btn btn-primary">↑ Save project</button>
            <div class="card-divider"></div>
            <div style="margin-bottom:6px">
              <span class="field-label">Projekte</span>
            </div>
            <div id="projectList" style="font-size:13px;color:#999;min-height:24px">Laden…</div>
          </div>
        </section>
      </aside>

      <section id="viewer">
        <div id="pdfContainer">
          <canvas id="pdfCanvas"></canvas>
          <svg id="overlay"></svg>
        </div>
      </section>
    </div>
  </main>

  <script src="vendor/pdfjs/build/pdf.js"></script>
  <script src="vendor/jspdf/jspdf.umd.min.js"></script>
  <script src="vendor/vercel-blob-client.js"></script>
  <script src="app.js"></script>
</body>
</html>
